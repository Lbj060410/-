plugins {
    id 'com.android.application' version '8.5.0'
    // 只引入google-services插件，不指定版本（根目录已统一）
    id("com.google.gms.google-services")
}

android {
    namespace 'com.example.ml_lik_car'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.ml_lik_car"
        minSdk 26 // 降低兼容版本，适配OpenCV
        targetSdk 34
        versionCode 1
        versionName "1.0"

        ndk {
            moduleName "serial_port"
            ldLibs "log", "z", "m"
            abiFilters "arm64-v8a", "armeabi-v7a" // 移除多余反斜杠
        }

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // 适配Gradle 8.5.0的NDK版本
    ndkVersion "25.2.9519653"

    externalNativeBuild {
        cmake {
            version "3.22.1"
            path "src/main/jni/CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        encoding "UTF-8"
    }
    aaptOptions {
        noCompress "tflite", "lite", "bin", "txt" // 防止模型/标签文件被压缩
    }

    // 移除无效的kotlinOptions配置块（核心修复点）
}

dependencies {
    implementation project(path: ':open_cv')// OpenCV核心依赖（确保模块已导入）

    // 基础依赖
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.palette:palette:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    // ONNX/TensorFlow Lite（核心修复：统一版本，移除重复）
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.17.0'
    // 统一使用 2.15.0 版本，删除旧的 2.13.0 依赖
    implementation 'org.tensorflow:tensorflow-lite:2.15.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu:2.15.0' // GPU 核心依赖

    // Google ML Kit（去重）
    implementation platform('com.google.firebase:firebase-bom:32.7.2')
    implementation "com.google.firebase:firebase-auth"
    implementation "com.google.firebase:firebase-firestore"
    implementation 'com.google.android.gms:play-services-vision:20.1.3'
    implementation 'com.google.mlkit:text-recognition:16.0.1'
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'
    implementation 'com.google.mlkit:barcode-scanning:17.3.0'
    implementation 'com.google.android.gms:play-services-mlkit-barcode-scanning:18.3.1'
    implementation 'com.google.android.gms:play-services-code-scanner:16.1.0'

    // 华为HMS ML Kit
    implementation 'com.huawei.hms:ml-computer-vision-documentskew:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-documentskew-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-face:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-face-shape-point-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-face-emotion-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-face-feature-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-imagesuperresolution:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-imagesuperresolution-model:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-textimagesuperresolution:3.11.0.303'
    implementation 'com.huawei.hms:ml-computer-vision-textimagesuperresolution-model:3.11.0.303'
    implementation 'com.huawei.hms:ml-computer-vision-classification:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-image-classification-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-handkeypoint:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-handkeypoint-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-gesture-model:3.7.0.301'
    implementation 'com.huawei.hms:ml-computer-vision-faceverify:3.11.0.302'
    implementation 'com.huawei.hms:ml-computer-vision-faceverify-model:3.11.0.302'

    // 第三方库（去重）
    implementation 'org.greenrobot:eventbus:3.3.1'
    implementation 'com.github.HyperInspire:hyperlpr3-android-sdk:1.0.3'

    // 本地jar包
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation files('libs/camerautil.jar')
    implementation files('libs/core.jar')

    // 测试依赖
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}